<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KL Dev-Ring Widget</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      color: #e8eadf;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    }
    .widget {
      width: min(440px, calc(100vw - 16px));
      padding: 1px;
      background: linear-gradient(135deg, hsla(var(--node-hue, 38), 90%, 60%, 0.6), rgba(255,255,255,0.05), hsla(var(--node-hue, 38), 90%, 60%, 0.2));
      box-shadow: 0 15px 35px rgba(0,0,0,.6), 0 0 25px hsla(var(--node-hue, 38), 90%, 60%, 0.1);
      border-radius: 4px;
      transition: background 0.5s, box-shadow 0.5s;
    }
    .inner {
      padding: 20px;
      background: rgba(9, 12, 11, 0.9);
      backdrop-filter: blur(15px);
      position: relative;
      overflow: hidden;
      border-radius: 3px;
    }
    .inner:after {
      content: "KL";
      position: absolute;
      right: -10px;
      bottom: -25px;
      color: hsla(var(--node-hue, 38), 90%, 65%, .04);
      font-size: 110px;
      font-weight: 700;
      font-family: system-ui, sans-serif;
      pointer-events: none;
      transition: color 0.5s;
    }
    .top, .person, .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .top {
      font-size: 8px;
      letter-spacing: .16em;
      color: #8b9289;
    }
    .live {
      color: #7ad8a6;
      text-shadow: 0 0 6px #7ad8a6;
    }
    .person {
      margin: 22px 0;
    }
    .person h1 {
      margin: 5px 0 0 0;
      font: 500 20px system-ui, sans-serif;
      letter-spacing: -0.02em;
    }
    .person span {
      font-size: 9px;
      color: hsl(var(--node-hue, 38) 90% 65%);
      text-shadow: 0 0 8px hsla(var(--node-hue, 38) 90% 65% / 0.3);
      transition: color 0.5s, text-shadow 0.5s;
    }
    .score {
      display: flex;
      gap: 24px;
      font-size: 8px;
      color: #8b9289;
    }
    .score b {
      display: block;
      color: #e8eadf;
      font-size: 15px;
      margin-top: 4px;
    }
    .nav {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 15px;
    }
    .nav a {
      color: #8b9289;
      text-decoration: none;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      transition: color 0.2s;
    }
    .nav a:hover {
      color: hsl(var(--node-hue, 38) 90% 65%);
    }
  </style>
</head>
<body>
  <div class="widget"><div class="inner">
    <div class="top"><span>KL DEV-RING / BUILDER SIGNAL</span><span class="live">● LIVE</span></div>
    <div class="person"><div><span id="rank">RANK #—</span><h1 id="name">Loading signal...</h1></div><div class="score"><div>SCORE<b id="score">—</b></div><div>STREAK<b id="streak">—</b></div></div></div>
    <div class="nav"><a id="prev" href="#">← Previous</a><a id="home" href="./" target="_top">Open ring</a><a id="random" href="#">Random ◇</a><a id="next" href="#">Next →</a></div>
  </div></div>
  <script type="module">
    const data = await fetch("./data/network.json").then(r => r.json());
    const params = new URLSearchParams(location.search);
    let index = Math.max(0, data.nodes.findIndex(n => n.handle === params.get("member")));
    
    function show(i) {
      index = (i + data.nodes.length) % data.nodes.length;
      const n = data.nodes[index];
      document.querySelector("#rank").textContent = `RANK #${n.rank}`;
      document.querySelector("#name").textContent = n.name;
      document.querySelector("#score").textContent = n.score;
      document.querySelector("#streak").textContent = `${n.stats?.streak || 0}W`;
      document.querySelector("#home").href = `./builders/${n.handle}/`;
      
      // Dynamically update card hue variables
      document.querySelector(".widget").style.setProperty("--node-hue", n.hue ?? 38);
    }
    
    document.querySelector("#prev").onclick = e => { e.preventDefault(); show(index - 1); };
    document.querySelector("#next").onclick = e => { e.preventDefault(); show(index + 1); };
    document.querySelector("#random").onclick = e => { e.preventDefault(); show(Math.floor(Math.random() * data.nodes.length)); };
    show(index);
  </script>
</body>
</html>
