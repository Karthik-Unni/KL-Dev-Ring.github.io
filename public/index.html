<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080b0c">
  <meta name="description" content="KL Dev-Ring is Kerala's open-source builder network. Ranked by what you ship. Connected by what you build.">
  <title>KL Dev-Ring — Kerala's Builder Network</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <!-- Boot intro screen -->
  <div class="boot" id="boot" role="dialog" aria-label="Initializing KL Dev-Ring">
    <button class="boot-skip" id="skipBoot">Skip intro ↗</button>
    <div class="boot-radar" aria-hidden="true"><i></i><i></i><i></i></div>
    <div class="boot-copy">
      <span class="eyebrow">KL / NETWORK BOOT</span>
      <h1 id="bootLine">Initializing Kerala Builder Network...</h1>
      <div class="boot-track"><span id="bootProgress"></span></div>
      <div class="boot-metrics" id="bootMetrics"></div>
    </div>
  </div>

  <header class="topbar">
    <a class="brand" href="./" aria-label="KL Dev-Ring home">
      <svg viewBox="0 0 46 46" aria-hidden="true">
        <path d="M23 2 42 12v22L23 44 4 34V12Z"/>
        <path d="m12 27 7-11v14m0-7 9-7m-9 7 9 7m-1-14h7m-7 14h7"/>
      </svg>
      <span><b>KL</b> DEV-RING</span>
    </a>
    <div class="topbar-stats" id="topbarStats">
      <!-- Live telemetry stats rendered by JS -->
    </div>
    <a class="join-button" href="https://github.com/KLWebRing/KL-Dev-Ring.github.io#join" target="_blank" rel="noreferrer">
      <span>Join the ring</span><i>↗</i>
    </a>
  </header>

  <main class="dashboard-wrap">
    <!-- LEFT PANEL: WebRing Explorer -->
    <section class="explorer-pane" id="ringView" aria-label="Browse the KL Dev-Ring">
      <div class="explorer-inner">
        <div class="ring-orbit" id="ringOrbit">
          <div class="ring-track" id="ringTrack">
            <!-- Active builder cards rendered dynamically by JS -->
          </div>
          <div class="ring-focus" aria-hidden="true"></div>
        </div>
        
        <div class="ring-console">
          <button class="ring-step ring-prev" id="ringPrev">
            <span>PREVIOUS</span><b id="ringPrevName">Builder</b>
          </button>
          <div class="ring-position">
            <span id="ringCounter">00 / 00</span>
            <div class="ring-progress"><i id="ringProgress"></i></div>
            <small>ARROW KEYS / SWIPE / SCROLL</small>
          </div>
          <button class="ring-random" id="ringRandom" aria-label="Visit a random builder">RANDOM SIGNAL</button>
          <button class="ring-step ring-next" id="ringNext">
            <span>NEXT</span><b id="ringNextName">Builder</b>
          </button>
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL: Always-on Leaderboard -->
    <section class="leaderboard-pane" aria-label="Builder Rankings">
      <div class="leaderboard-header">
        <span class="eyebrow"><span class="live-dot"></span> DIRECTORY / RANKINGS</span>
        <h2>Active Signal List</h2>
        <div class="search-wrap">
          <span>⌕</span>
          <input id="search" type="search" placeholder="Filter by name, district, or craft..." autocomplete="off">
        </div>
        <div class="leaderboard-tabs" role="tablist" aria-label="Ranking Categories">
          <button class="tab-btn active" data-tab="all-time" role="tab" aria-selected="true">All-Time</button>
          <button class="tab-btn" data-tab="weekly" role="tab" aria-selected="false">Weekly</button>
          <button class="tab-btn" data-tab="districts" role="tab" aria-selected="false">Districts</button>
          <button class="tab-btn" data-tab="colleges" role="tab" aria-selected="false">Colleges</button>
        </div>
      </div>
      
      <div class="leaderboard-body">
        <table class="sidebar-table">
          <thead>
            <tr id="leaderboardHeaderRow">
              <th>RANK</th>
              <th>BUILDER</th>
              <th class="num-col">SCORE</th>
              <th class="num-col">STREAK</th>
            </tr>
          </thead>
          <tbody id="leaderboardRows">
            <!-- Rendered dynamically by JS -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog class="profile-modal" id="profileModal">
    <button class="modal-close" id="closeProfile" aria-label="Close profile">×</button>
    <div id="profileContent"></div>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
